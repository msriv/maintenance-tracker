name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.0.3-dev or v1.0.0)'
        required: true

jobs:
  release:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Resolve tag + version from either a tag push or manual dispatch
      # ------------------------------------------------------------------
      - name: Resolve version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          IS_PRERELEASE="false"
          if [[ "$VERSION" == *"dev"* || "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "tag=$TAG"             >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Java + Gradle
      # ------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      # ------------------------------------------------------------------
      # Build — debug keystore used for signing until a release keystore
      # is configured (add KEYSTORE_BASE64 + secrets to switch over)
      # ------------------------------------------------------------------
      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Locate & rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEST="app/build/outputs/apk/release/MotoTracker-${{ steps.vars.outputs.version }}.apk"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Create GitHub Release + attach APK
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: MotoTracker ${{ steps.vars.outputs.version }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
