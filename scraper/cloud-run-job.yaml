apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: mototracker-scraper
  namespace: mototracker-491619
spec:
  template:
    spec:
      template:
        spec:
          containers:
            - image: gcr.io/mototracker-491619/mototracker-scraper:latest
              env:
                - name: SCRAPER_PROJECT_ID
                  value: mototracker-491619
                - name: LOG_LEVEL
                  value: INFO
                - name: RATE_LIMIT_SECONDS
                  value: "1.0"
                - name: MAX_RETRIES
                  value: "3"
              resources:
                limits:
                  cpu: "1"
                  memory: 512Mi
          timeoutSeconds: 3600
          maxRetries: 1
          serviceAccountName: mototracker-scraper@mototracker-491619.iam.gserviceaccount.com
